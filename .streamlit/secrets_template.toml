# Copy this structure into the Streamlit Community Cloud secrets dashboard
# (App settings → Secrets). Never commit real values.
#
# This is a TEMPLATE (secrets_template.toml). Streamlit only auto-loads a file
# named secrets.toml, so this template is safe to commit and is ignored at runtime.

CLIP_PASSWORD = "your-password-here"
ANTHROPIC_API_KEY = "your-key-here"
CENSUS_API_KEY = "your-key-here"
