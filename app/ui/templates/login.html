<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIP — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    .login-error {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }
    .btn-google {
      display: inline-block;
      padding: 10px 36px;
      background: transparent;
      border: 1px solid var(--cobalt);
      color: var(--cobalt);
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover {
      background: var(--cobalt);
      color: var(--star-white);
      box-shadow: 0 0 16px rgba(61, 90, 241, 0.45);
    }
  </style>
</head>
<body>

  <div class="bg-night" aria-hidden="true">
    <div class="bg-swirl"></div>
    <div class="bg-swirl"></div>
    <div class="bg-swirl"></div>
    <div class="bg-swirl"></div>
    <div id="stars"></div>
  </div>

  <main id="view-login" class="view" role="main" aria-label="Sign in">
    <div class="login-card">
      <h1 class="wordmark" aria-label="CLIP">CLIP</h1>
      <p class="subtitle">Charter Community Landscape Intelligence Platform</p>
      {% if error == "unauthorized" %}
      <p class="login-error">Access restricted to @themindtrust.org accounts.</p>
      {% elif error %}
      <p class="login-error">Sign-in error — please try again.</p>
      {% endif %}
      <a href="/login" class="btn-google">Sign in with Google</a>
    </div>
  </main>

  <script>
    (function () {
      const container = document.getElementById("stars");
      const count = 75;
      for (let i = 0; i < count; i++) {
        const star = document.createElement("div");
        const size = Math.random() * 2.2 + 0.4;
        star.className = "star" + (i % 9 === 0 ? " pulsing" : "");
        star.style.cssText = [
          `left:${(Math.random() * 100).toFixed(2)}%`,
          `top:${(Math.random() * 100).toFixed(2)}%`,
          `width:${size.toFixed(2)}px`,
          `height:${size.toFixed(2)}px`,
          `opacity:${(Math.random() * 0.55 + 0.25).toFixed(2)}`,
          `animation-delay:${(Math.random() * 5).toFixed(2)}s`,
        ].join(";");
        container.appendChild(star);
      }
    })();
  </script>

</body>
</html>
