NM:
  charter_law:
    cap_on_charters: false
    facilities_provisions: limited
    funding_parity_provisions: true
    notes: Verify current amendment status before citing. Law has been amended multiple
      times.
    statute_citation: NMSA 1978 § 22-8B
    statute_url: https://www.nmlegis.gov
  community_metadata:
    nm-jemez-pueblo:
      special_considerations: "Pueblo jurisdiction — tribal governance and legal considerations not captured in scoring model. Requires human review before any strategic use."
      tribal_jurisdiction_flag:
        status: FLAGGED
        basis: "Pueblo of Jemez — tribal governance per special_considerations."
        note: "Charter authorization on Pueblo land may involve tribal jurisdiction not modeled by scoring. Human review required before any strategic use."
    nm-navajo:
      tribal_jurisdiction_flag:
        status: FLAGGED
        basis: "Navajo Nation artifact — no NCES LEA match (null district mapping)."
        note: "Likely within Navajo Nation jurisdiction. Charter authority and applicable law require human determination. Not for strategic use without review."
    nm-shiprock:
      tribal_jurisdiction_flag:
        status: FLAGGED
        basis: "Shiprock / Navajo Nation — no NCES LEA match (null district mapping)."
        note: "Likely within Navajo Nation jurisdiction. Charter authority and applicable law require human determination. Not for strategic use without review."
    nm-gallup:
      tribal_jurisdiction_flag:
        status: PENDING_HUMAN_REVIEW
        # Human determination required — Gallup borders the Navajo Nation; portions
        # of the service area may fall under tribal jurisdiction. This flag is NOT an
        # assertion of sovereignty. It marks that the determination has not been made.
        note: "Gallup sits adjacent to the Navajo Nation service area. Whether any charter activity touches tribal jurisdiction must be determined by a human before strategic use."
        resolution_path: "Human legal/policy review of Gallup service area vs. Navajo Nation jurisdictional boundary required before strategic use."
    nm-espanola:
      tribal_jurisdiction_flag:
        status: PENDING_HUMAN_REVIEW
        # Human determination required — Espanola is surrounded by multiple pueblos
        # (Ohkay Owingeh, Santa Clara). This flag is NOT an assertion of sovereignty.
        # It marks that the determination has not been made.
        note: "Espanola is surrounded by multiple pueblos (Ohkay Owingeh, Santa Clara). Whether any charter activity touches tribal jurisdiction must be determined by a human before strategic use."
        resolution_path: "Human legal/policy review of Espanola service area vs. adjacent pueblo jurisdictional boundaries required before strategic use."
  # Statewide scaffold (Session 18, area G). Surfaced by S6 into every NM brief's
  # needs_verification with impact_if_wrong=HIGH. The NM statewide teacher shortage
  # is documented, but per-community hard-to-staff status is NOT verified here.
  # TODO: requires verified source — populate per-community designations from the
  # NMPED hard-to-staff / shortage-area list. Do NOT invent designations.
  teacher_supply_warning:
    status: UNVERIFIED
    impact_if_wrong: HIGH
    claim: "Teacher supply may constrain charter staffing in this community."
    reason: "New Mexico has a documented statewide teacher shortage, but this community's specific hard-to-staff status has not been verified against the NMPED shortage-area list."
    resolution_path: "Cross-check the community against the current NMPED teacher shortage-area / hard-to-staff designation list before relying on staffing feasibility."
  community_boundary_exceptions:
  - community_id: nm-albuquerque
    note: 'Use Albuquerque city limits + Bernalillo County overlap. ABQ spans multiple
      zip codes and neighborhoods; sub-community analysis may be warranted.

      '
  - community_id: nm-rio-rancho
    note: Separate municipality; distinct charter market from ABQ despite proximity.
  excluded_communities:
  - nm-cleveland  # excluded: district enrollment ~399 (NCES 2024), below
                  # viable charter scale. Generalizable exclusion — any
                  # community where district enrollment cannot support
                  # minimum school unit economics. Re-evaluate when
                  # NCES-at-S1 is built and minimum-size filter is
                  # implemented structurally.
  # Sub-district / location-string artifacts (Session 18, area I). These are not
  # distinct charter markets — they are PED roster location strings that resolve to
  # an already-covered parent district, so leaving them in double-counts the parent.
  # FLAG: operator should confirm these are duplicates before the next statewide scan.
  - nm-los-ranchos-de-albuquerque  # village inside the Albuquerque metro; maps to
                                    # ALBUQUERQUE (NCES 3500060) = nm-albuquerque.
  - nm-east-taos                   # sub-area of Taos; maps to TAOS (NCES 3502520) = nm-taos.
  - nm-w-taos                      # sub-area of Taos; maps to TAOS (NCES 3502520) = nm-taos.
  - nm-arbolera-espanola           # Arbolera de Vida subdivision; maps to ESPANOLA
                                    # (NCES 3500900) = nm-espanola.
  - nm-nm-602-gallup               # S1 address-parsing artifact — duplicate of nm-gallup;
                                    # excluded to prevent double-counting. "NM-602" is NM
                                    # State Road 602 captured from Six Directions Indigenous
                                    # School's street address ("2055 NM-602 Gallup, NM 87301"),
                                    # not a ZIP/sequence; maps to GALLUP (NCES 3501110) =
                                    # nm-gallup. Stale 2026-05-26 cache left intact per task.
  community_unit: MUNICIPALITY
  data_sources:
    authorizer_registry:
      description: List of NM charter authorizers
      format: HTML
      known_authorizers:
      - id: nm-auth-pec
        jurisdiction: STATEWIDE
        name: Public Education Commission (PEC)
        notes: Primary statewide authorizer. Elected board.
        type: STATE_BOARD
      - community_id: nm-albuquerque
        id: nm-auth-aps
        jurisdiction: MUNICIPAL
        name: Albuquerque Public Schools (APS)
        type: LOCAL_DISTRICT
      - community_id: nm-santa-fe
        id: nm-auth-sfps
        jurisdiction: MUNICIPAL
        name: Santa Fe Public Schools (SFPS)
        type: LOCAL_DISTRICT
      refresh_cadence: AS_NEEDED
      source_class: PED_DATA
      url: https://webed.ped.state.nm.us
    census:
      description: ACS 5-year estimates for community demographics
      format: API
      refresh_cadence: ANNUAL
      source_class: FEDERAL_DATA
      table_ids:
      - B01003
      - B19013
      - B15003
      - S1401
      url: https://data.census.gov
    charter_roster:
      description: NM PED list of active charter schools by authorizer
      format: HTML_TABLE
      notes: Download as CSV. Check for recently approved/revoked schools.
      refresh_cadence: ANNUAL
      source_class: PED_DATA
      url: https://webed.ped.state.nm.us/sites/SBF/Lists/SBFCharterSchools/AllItems.aspx
    csp_awards:
      description: CSP grant awards to NM charter schools
      format: SEARCHABLE_DB
      refresh_cadence: ANNUAL
      source_class: FEDERAL_DATA
      url: https://oese.ed.gov/offices/office-of-discretionary-grants-support-services/charter-schools-program/
    enrollment_data:
      description: NM PED enrollment by school and district
      format: EXCEL
      notes: Released each October for prior year.
      refresh_cadence: ANNUAL
      source_class: PED_DATA
      url: https://webed.ped.state.nm.us
    performance_data:
      description: NM school grades and accountability data
      format: EXCEL
      notes: School report cards. Proficiency rates, attendance, graduation.
      refresh_cadence: ANNUAL
      source_class: PED_DATA
      url: https://webed.ped.state.nm.us
  discovery:
    deduplicate_by: city_field_in_ped_data
    group_by: MUNICIPALITY
    method: PARSE_PED_ROSTER
    minimum_schools_to_qualify: 1
    notes: 'PED roster includes a city/location field. Group schools by city. For
      schools listed outside a city, use county seat or nearest urban center.

      '
